<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <link
      rel="stylesheet"
      href="./styles/style.css"
    />
    <link
      rel="stylesheet"
      href="./styles/header.css"
    />
    <link
      rel="stylesheet"
      href="/styles/footer.css"
    />
    <script
      src="script.js"
      defer
    ></script>
    <link
      rel="shortcut icon"
      href="./assets/icons/logo_small.png"
      type="image/x-icon"
    />
    <title>Fotogram</title>
  </head>
  <body>
    <header class="header">
      <a
        href="./index.html"
        class="header-home-link"
        aria-label="Fotogram Startseite"
        ><img
          src="./assets/icons/logo.png"
          alt="logo"
          class="header-logo"
        />
      </a>
      <a
        href="./index.html"
        class="small-header-home-link"
        aria-hidden="true"
      >
        <img
          src="./assets/icons/logo_small.png"
          alt="logo"
          class="small-header-logo"
        />
      </a>
    </header>
    <main class="main-section">
      <h1>Your personal photo album</h1>
      <div
        id="all-images-container"
        class="all-images-container"
        role="list" 
        aria-label="Fotogalerie"></div>
      ></div>
      <dialog
        id="dialog"
        class="dialog"
        aria-labelledby="dialog-image-caption"
      >
        <p id="dialog-image-caption"></p>
        <img
          id="dialog-img"
          class="dialog-img"
          src=""
          alt=""
        />
        <div class="arrow-container">
          <img
            onclick="slideLeftImage()"
            onkeydown="handleArrowKey(event, slideLeftImage)"
            src="./assets/icons/left-arrow.png"
            alt=""
            aria-label="Vorheriges Bild"
            role="button"
            class="dialog-arrow"
            tabindex="0"
          />
          <img
            onclick="slideRightImage()"
            onkeydown="handleArrowKey(event, slideRightImage)"
            src="./assets/icons/right-arrow.png"
            alt=""
            role="button"
            aria-label="Nächstes Bild"
            class="dialog-arrow"
            tabindex="0"
          />
        </div>
        <button
          onclick="closeDialog()"
          class="dialog-button"
          aria-label="Dialog schließen"
        >
          close
        </button>
      </dialog>
    </main>
    <footer class="footer">
      <a
        href="./pages/datenschutz.html"
        class="footer-link"
        >Datenschutz</a
      >
      <a
        href="./pages/impressum.html"
        class="footer-link"
        >Impressum</a
      >
    </footer>
  </body>
</html>
