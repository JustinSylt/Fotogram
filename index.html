<!doctype html>
<html lang="de">
	<head>
		<meta charset="UTF-8" />
		<meta
			name="viewport"
			content="width=device-width, initial-scale=1.0" />
		<title>Fotogram</title>
		<link
			rel="stylesheet"
			href="style.css" />
		<script
			src="script.js"
			defer></script>
		<link
			rel="shortcut icon"
			href="/assets/icons/camera-icon.png"
			type="image/x-icon" />
	</head>
	<body>
		<header class="page-heading">
			<a
				href="/index.html"
				class="header-home-link"
				><img
					src="/assets/icons/camera-icon.png"
					alt="fotogram-logo"
					class="header-logo" />
				<h1>Fotogram</h1>
			</a>
		</header>
		<main>
			<h1 class="title">Foto Gallery</h1>

			<dialog
				id="img-dialog"
				class="slideshow-dialog">
				<header
					class=""
					id="dialog-header"></header>
				<section id="dialog-img-container"></section>
				<footer>
					<button onclick="closeDialog()">Schließen</button>
				</footer>
			</dialog>

			<section
				id="image-container"
				class="all-images-section"></section>
		</main>
		<footer id="page-footer"></footer>
	</body>
</html>
