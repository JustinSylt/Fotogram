<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <link
      rel="stylesheet"
      href="./styles/style.css"
    />
    <link
      rel="stylesheet"
      href="./styles/header.css"
    />
    <link
      rel="stylesheet"
      href="./styles/footer.css"
    />
    <script
      src="script.js"
      defer
    ></script>
    <link
      rel="shortcut icon"
      href="./assets/icons/logo_small.png"
      type="image/x-icon"
    />
    <title>Fotogram</title>
  </head>
  <body>
    <header class="header">
      <a
        href="./index.html"
        class="header-home-link"
        aria-label="Fotogram Startseite"
        ><img
          src="./assets/icons/logo.png"
          alt="logo"
          class="header-logo"
        />
      </a>
      <a
        href="./index.html"
        class="small-header-home-link"
        aria-hidden="true"
      >
        <img
          src="./assets/icons/logo_small.png"
          alt="logo"
          class="small-header-logo"
        />
      </a>
    </header>
    <main class="main-section">
      <h1>Your personal photo album</h1>
      <div
        id="all-images-container"
        class="all-images-container"
        role="list"
        aria-label="Fotogalerie"
      ></div>
      <dialog
        id="dialog"
        class="dialog"
        aria-labelledby="dialog-image-caption"
      >
        <div class="dialog-content">
          <div class="dialog-header">
            <span
              class="dialog-header-spacer"
              aria-hidden="true"
            ></span>
            <p id="dialog-image-caption"></p>
            <button
              onclick="closeDialog()"
              class="dialog-button"
              aria-label="Dialog schließen"
            >
              X
            </button>
          </div>
          <img
            id="dialog-img"
            class="dialog-img"
            src=""
            alt=""
          />
          <div class="arrow-container">
            <button
              onclick="slideLeftImage()"
              class="dialog-arrow-button"
            >
              <img
                src="./assets/icons/left-arrow.png"
                alt=""
                aria-label="Vorheriges Bild"
                class="dialog-arrow"
              />
            </button>
            <p id="current-image-index"></p>
            <button
              onclick="slideRightImage()"
              class="dialog-arrow-button"
            >
              <img
                src="./assets/icons/right-arrow.png"
                alt=""
                aria-label="Nächstes Bild"
                class="dialog-arrow"
              />
            </button>
          </div>
        </div>
      </dialog>
    </main>
    <footer class="footer">
      <a
        href="./pages/datenschutz.html"
        class="footer-link"
        >Datenschutz</a
      >
      <div class="footer-logo-container">
        <img
          src="./assets/icons/DALogo.png"
          alt="Developer Academy Logo"
          class="footer-logo"
        />
        <p class="copyright-tag">&copy; 2026 Justin Dohmen</p>
      </div>
      <a
        href="./pages/impressum.html"
        class="footer-link"
        >Impressum</a
      >
    </footer>
  </body>
</html>
